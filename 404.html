<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — Sujan Bastola</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000;
      color: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 480px; }
    .logo {
      width: 72px; height: 72px; border-radius: 18px;
      background: linear-gradient(135deg, #2997ff, #bf5af2);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #fff;
      margin: 0 auto 32px;
      box-shadow: 0 0 40px rgba(41,151,255,0.35);
    }
    .code {
      font-size: clamp(72px, 20vw, 120px);
      font-weight: 800;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, #2997ff, #bf5af2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    h1 { font-size: clamp(20px, 5vw, 28px); font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: #86868b; font-size: 16px; line-height: 1.7; margin-bottom: 40px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 40px;
      background: linear-gradient(135deg, #2997ff, #bf5af2);
      color: #fff; font-size: 16px; font-weight: 700;
      text-decoration: none; font-family: inherit;
      box-shadow: 0 4px 24px rgba(41,151,255,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(41,151,255,0.45); }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #2997ff44, #bf5af244, transparent); margin: 40px 0; }
    .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .link { color: #86868b; font-size: 14px; text-decoration: none; transition: color 0.2s; }
    .link:hover { color: #f5f5f7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">SB</div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">← Back to Portfolio</a>
    <div class="divider"></div>
    <div class="links">
      <a href="/#projects" class="link">Projects</a>
      <a href="/#skills" class="link">Skills</a>
      <a href="/#contact" class="link">Contact</a>
      <a href="https://github.com/sujanbastola" class="link" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
